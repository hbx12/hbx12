<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="270" viewBox="0 0 1200 270" role="img" aria-labelledby="title desc">
  <title id="title">HBX1 Identity Core</title><desc id="desc">Identity core, focus areas and operating principles for HBX1.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#060B16"/><stop offset=".52" stop-color="#090F1F"/><stop offset="1" stop-color="#040814"/></linearGradient><linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#8B5CF6"/><stop offset="1" stop-color="#22D3EE"/></linearGradient><style>.t{font-family:Inter,Segoe UI,Arial,sans-serif}.m{font-family:"JetBrains Mono",monospace}</style></defs>
  <rect width="1200" height="270" rx="24" fill="url(#bg)"/><rect x="1" y="1" width="1198" height="268" rx="23" fill="none" stroke="#243553"/><text x="36" y="42" class="m" font-size="14" letter-spacing="3" fill="#8B9BB9">IDENTITY CORE // HBX1</text><text x="1070" y="42" class="m" font-size="13" fill="#7083A8">ACCESS: PUBLIC</text><path d="M36 64H1164" stroke="url(#line)" stroke-width="1.4"/>
  <g><rect x="38" y="88" width="352" height="174" rx="18" fill="#0A1224" stroke="#2E4368"/><path d="M38 120V106a18 18 0 0 1 18-18h92" fill="none" stroke="#8B5CF6" stroke-width="2"/><text x="62" y="118" class="m" font-size="12" letter-spacing="2.6" fill="#C084FC">MISSION</text><text x="62" y="156" class="t" font-size="23" font-weight="700" fill="#F4F7FF">Build systems that survive</text><text x="62" y="185" class="t" font-size="23" font-weight="700" fill="#F4F7FF">contact with real users.</text><text x="62" y="228" class="t" font-size="16" fill="#97A5C0">Not demos. Not empty hype.</text><text x="62" y="254" class="t" font-size="16" fill="#97A5C0">Useful products with clear boundaries.</text></g>
  <g><rect x="425" y="88" width="352" height="174" rx="18" fill="#0A1224" stroke="#2E4368"/><path d="M425 120V106a18 18 0 0 1 18-18h92" fill="none" stroke="#22D3EE" stroke-width="2"/><text x="449" y="118" class="m" font-size="12" letter-spacing="2.6" fill="#22D3EE">CURRENT VECTOR</text><text x="449" y="156" class="t" font-size="24" font-weight="700" fill="#F4F7FF">Secure AI automation</text><text x="449" y="188" class="t" font-size="16" fill="#97A5C0">Local-first agents, explicit approval,</text><text x="449" y="214" class="t" font-size="16" fill="#97A5C0">multi-provider routing, and real tooling.</text><circle cx="451" cy="244" r="5" fill="#22D3EE"><animate attributeName="opacity" values=".35;1;.35" dur="2s" repeatCount="indefinite"/></circle><text x="466" y="249" class="m" font-size="13" fill="#D7E5FF">PRIMARY PROJECT: AURA WORK</text></g>
  <g><rect x="810" y="88" width="352" height="174" rx="18" fill="#0A1224" stroke="#2E4368"/><path d="M810 120V106a18 18 0 0 1 18-18h92" fill="none" stroke="#C084FC" stroke-width="2"/><text x="834" y="118" class="m" font-size="12" letter-spacing="2.6" fill="#C084FC">OPERATING RULES</text><g class="t" font-size="17" fill="#DDE7F8"><text x="850" y="156">Security before convenience</text><text x="850" y="193">Practical before impressive</text><text x="850" y="230">Ship, measure, harden</text></g><g class="m" font-size="13" fill="#A78BFA"><text x="826" y="156">01</text><text x="826" y="193">02</text><text x="826" y="230">03</text></g></g>
</svg>