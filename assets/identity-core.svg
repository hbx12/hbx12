<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">HBX1 operating principles</title>
  <desc id="desc">The identity, focus, and operating principles of Habib HBX1.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1324"/>
      <stop offset="1" stop-color="#0A0F1C"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset=".5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="300" rx="24" fill="#070A12"/>
  <rect x="1" y="1" width="1198" height="298" rx="23" fill="none" stroke="#30394B"/>
  <text x="38" y="44" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" letter-spacing="3">IDENTITY CORE // HBX1</text>
  <text x="1160" y="44" text-anchor="end" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">ACCESS: PUBLIC</text>
  <rect x="38" y="63" width="1124" height="2" fill="url(#line)" opacity=".8"/>

  <g transform="translate(38 88)">
    <rect width="350" height="174" rx="18" fill="url(#panel)" stroke="#293244"/>
    <text x="24" y="32" fill="#C084FC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2">MISSION</text>
    <text x="24" y="68" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Build systems that survive</text>
    <text x="24" y="96" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">contact with real users.</text>
    <text x="24" y="130" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="15">Not demos. Not empty hype.</text>
    <text x="24" y="154" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="15">Useful products with clear boundaries.</text>
  </g>

  <g transform="translate(425 88)">
    <rect width="350" height="174" rx="18" fill="url(#panel)" stroke="#293244"/>
    <text x="24" y="32" fill="#22D3EE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2">CURRENT VECTOR</text>
    <text x="24" y="67" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Secure AI automation</text>
    <text x="24" y="99" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="15">Local-first agents, explicit approval,</text>
    <text x="24" y="123" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="15">multi-provider routing, real tooling.</text>
    <circle cx="26" cy="150" r="5" fill="#22D3EE" filter="url(#glow)">
      <animate attributeName="opacity" values=".3;1;.3" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="155" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12">PRIMARY PROJECT: AURA WORK</text>
  </g>

  <g transform="translate(812 88)">
    <rect width="350" height="174" rx="18" fill="url(#panel)" stroke="#293244"/>
    <text x="24" y="32" fill="#C084FC" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2">OPERATING RULES</text>
    <g fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="16">
      <text x="48" y="69">Security before convenience</text>
      <text x="48" y="103">Practical before impressive</text>
      <text x="48" y="137">Ship, measure, harden</text>
    </g>
    <g fill="none" stroke-width="2">
      <path d="M24 61l6 6 11-14" stroke="#8B5CF6"/>
      <path d="M24 95l6 6 11-14" stroke="#22D3EE"/>
      <path d="M24 129l6 6 11-14" stroke="#C084FC"/>
    </g>
  </g>
</svg>