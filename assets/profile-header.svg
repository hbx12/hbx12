<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070B14"/>
      <stop offset="0.48" stop-color="#11152A"/>
      <stop offset="1" stop-color="#17102A"/>
    </linearGradient>
    <linearGradient id="accent" x1="300" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.52" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(190 44) rotate(38) scale(330 220)">
      <stop stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1015 274) rotate(-145) scale(360 240)">
      <stop stop-color="#8B5CF6" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
