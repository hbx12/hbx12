    <rect width="1200" height="320" fill="url(#grid)"/>
    <rect width="1200" height="320" fill="url(#glowA)"/>
    <rect width="1200" height="320" fill="url(#glowB)"/>

    <circle cx="112" cy="82" r="74" stroke="#22D3EE" stroke-opacity="0.13"/>
    <circle cx="112" cy="82" r="50" stroke="#22D3EE" stroke-opacity="0.1"/>
    <circle cx="1092" cy="242" r="96" stroke="#A78BFA" stroke-opacity="0.11"/>
    <circle cx="1092" cy="242" r="66" stroke="#A78BFA" stroke-opacity="0.08"/>

    <path d="M0 271C176 234 311 306 493 270C690 231 822 288 1200 216" stroke="url(#accent)" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M0 284C194 247 333 316 510 283C706 247 875 296 1200 238" stroke="#FFFFFF" stroke-opacity="0.045"/>

    <g transform="translate(600 55)">
      <path d="M0 0L38 14V48C38 75 21 94 0 104C-21 94-38 75-38 48V14L0 0Z" stroke="url(#accent)" stroke-width="2.5" fill="#0B1020" fill-opacity="0.72"/>
      <path d="M-15 49L-5 59L17 35" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="0" cy="52" r="46" stroke="#8B5CF6" stroke-opacity="0.12" stroke-width="10" filter="url(#softGlow)"/>
    </g>

    <text x="600" y="206" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="5" filter="url(#textGlow)">HABIB · HBX1</text>
    <rect x="355" y="224" width="490" height="2" rx="1" fill="url(#accent)" opacity="0.85"/>
