    <text x="600" y="291" text-anchor="middle" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="1.4">FOUNDER OF NOVIR STUDIO · SAUDI ARABIA</text>
