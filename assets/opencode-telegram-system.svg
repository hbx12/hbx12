  <text x="36" y="38" class="m" font-size="13" letter-spacing="2.6" fill="#7F97BD">OPEN-SOURCE CONTRIBUTION VECTOR / 03</text><text x="36" y="88" class="t" font-size="40" font-weight="800" fill="#F4F7FF">OpenCode Telegram Bot</text><text x="36" y="125" class="t" font-size="15" fill="#D2DDF3">Secure remote AI coding workflows from Telegram — sessions, models, approvals, files, and live agent activity.</text><text x="36" y="165" class="t" font-size="13.4" fill="#A9B7D2">Focus: reliability · UTF-8 safety · tests · developer experience · open-source collaboration</text><text x="1146" y="194" class="m" font-size="12" fill="#7C8CAC" text-anchor="end">VIEW PUBLIC WORK</text>
