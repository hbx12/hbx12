<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Telegram Bot</title><desc id="desc">Open source work on secure remote AI coding workflows.</desc>
