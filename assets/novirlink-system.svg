<svg xmlns="http://www.w3.org/2000/svg" width="580" height="300" viewBox="0 0 580 300" role="img" aria-labelledby="title desc">
  <title id="title">NovirLink</title><desc id="desc">Discord and VRChat operations platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#071922"/><stop offset=".55" stop-color="#0A1020"/><stop offset="1" stop-color="#16102A"/></linearGradient>
    <radialGradient id="halo" cx=".75" cy=".4" r=".6"><stop stop-color="#22D3EE" stop-opacity=".27"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="580" height="300" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="578" height="298" rx="21" fill="none" stroke="#21495A"/>
  <rect width="580" height="300" rx="22" fill="url(#halo)"/>
  <text x="28" y="38" fill="#22D3EE" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="2">CONNECTED PLATFORM / 02</text>
  <circle cx="536" cy="34" r="5" fill="#C084FC" filter="url(#glow)"><animate attributeName="opacity" values=".3;1;.3" dur="1.9s" repeatCount="indefinite"/></circle>
  <text x="28" y="91" fill="#F8FAFC" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800">NovirLink</text>
  <text x="28" y="120" fill="#67E8F9" font-family="Arial, Helvetica, sans-serif" font-size="16">Discord × VRChat operations platform</text>
  <text x="28" y="159" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="14">Allowlists · Moderation · Appeals · Dashboards</text>
  <text x="28" y="183" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="14">Udon integrations · Group management · Automation</text>

  <g transform="translate(386 84)">
    <rect x="8" y="20" width="58" height="58" rx="16" fill="#0B1020" stroke="#22D3EE" stroke-width="2"/>
    <rect x="82" y="78" width="58" height="58" rx="16" fill="#0B1020" stroke="#8B5CF6" stroke-width="2"/>
    <path d="M62 72C92 62 84 44 109 44C135 44 144 62 136 82" fill="none" stroke="#64748B" stroke-width="3" stroke-dasharray="7 7">
      <animate attributeName="stroke-dashoffset" values="0;-28" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="37" cy="49" r="11" fill="none" stroke="#22D3EE" stroke-width="3"/>
    <path d="M26 68c7-10 17-10 22 0" fill="none" stroke="#22D3EE" stroke-width="3"/>
    <path d="M99 96h24v19H99zM105 90v6M117 90v6" fill="none" stroke="#A78BFA" stroke-width="3"/>
    <circle cx="72" cy="68" r="5" fill="#22D3EE" filter="url(#glow)"/>
  </g>

  <g transform="translate(28 230)">
    <rect width="112" height="34" rx="17" fill="#0C1D25" stroke="#164E63"/>
    <text x="56" y="22" text-anchor="middle" fill="#67E8F9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">PRODUCTION</text>
    <rect x="124" width="122" height="34" rx="17" fill="#17152D" stroke="#4C3B72"/>
    <text x="185" y="22" text-anchor="middle" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">VRCHAT STACK</text>
  </g>
  <text x="548" y="266" text-anchor="end" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11">OPEN PLATFORM &gt;</text>
